version: '3.8'

services:
  db:
    image: postgres:16
    container_name: leadforge_db
    environment:
      POSTGRES_USER: leadforge
      POSTGRES_PASSWORD: leadforge_password
      POSTGRES_DB: leadforge_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
